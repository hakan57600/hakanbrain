<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAKAN BRAIN V8.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #00f2ff; --bg: #0a0a0c; }
        body { background-color: var(--bg); color: #e2e8f0; font-family: 'Arial', sans-serif; min-height: 100vh; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .neon-text { color: var(--accent); text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); font-weight: bold; }
        .btn-brain { background: #00f2ff; color: #000; transition: all 0.2s; }
        .btn-brain:hover { background: #00d8e4; transform: translateY(-1px); box-shadow: 0 4px 15px rgba(0, 242, 255, 0.3); }
        .message-ai { border-left: 4px solid #00f2ff; background: rgba(0, 242, 255, 0.03); border-radius: 0 1.5rem 1.5rem 1.5rem; }
        .message-user { background: rgba(255, 255, 255, 0.05); border-radius: 1.5rem 0 1.5rem 1.5rem; }
        input { font-family: 'Arial', sans-serif; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- LOGIN -->
    <div id="auth-layer" class="fixed inset-0 z-50 flex items-center justify-center bg-black p-4">
        <div class="glass p-10 rounded-3xl w-full max-w-md text-center">
            <h2 class="text-2xl font-bold mb-8 tracking-tight text-white">HAKAN BRAIN <span class="text-cyan-400 text-xs ml-2">v8.6</span></h2>
            <input type="text" id="l-user" placeholder="Kullanıcı" class="bg-white/5 border border-white/10 w-full p-4 rounded-xl mb-4 outline-none focus:border-cyan-500 transition-all text-center">
            <input type="password" id="l-pass" placeholder="Şifre" class="bg-white/5 border border-white/10 w-full p-4 rounded-xl mb-8 outline-none focus:border-cyan-500 transition-all text-center">
            <button id="l-btn" onclick="handleLogin()" class="btn-brain w-full p-4 rounded-xl font-bold uppercase tracking-wider shadow-lg">GİRİŞ YAP</button>
        </div>
    </div>

    <!-- APP -->
    <div id="app" class="hidden flex flex-col h-screen">
        <header class="p-4 border-b border-white/5 flex justify-between items-center px-8 bg-black/20">
            <div class="flex items-center gap-6">
                <h1 class="font-bold text-lg tracking-tight">HAKAN <span class="text-cyan-400">BRAIN</span></h1>
                <div id="device-pill" class="hidden md:block bg-cyan-500/10 border border-cyan-500/20 px-4 py-1 rounded-full">
                    <span id="device-name" class="text-[10px] font-bold uppercase tracking-widest text-cyan-400">YÜKLENİYOR...</span>
                </div>
            </div>
            <div id="sys-stats" class="flex gap-8 text-xs">
                <div class="flex flex-col items-center">
                    <span class="text-[8px] text-slate-500">CPU</span>
                    <span id="stat-cpu" class="neon-text">--</span>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-[8px] text-slate-500">RAM</span>
                    <span id="stat-ram" class="neon-text">--</span>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-[8px] text-slate-500">BAT</span>
                    <span id="stat-bat" class="neon-text">--</span>
                </div>
            </div>
            <button onclick="logout()" class="text-[10px] text-slate-400 hover:text-red-400 font-bold uppercase">ÇIKIŞ</button>
        </header>

        <main id="chat" class="flex-1 overflow-y-auto p-6 md:p-10 space-y-8 max-w-5xl w-full mx-auto"></main>

        <footer class="p-6 border-t border-white/5 bg-black/20">
            <div class="max-w-4xl mx-auto relative">
                <input type="text" id="u-input" placeholder="Emriniz nedir Hakan Bey?" 
                       class="bg-white/5 border border-white/10 w-full p-4 rounded-2xl pr-32 outline-none focus:border-cyan-500 transition-all text-sm">
                <button id="s-btn" onclick="handleSend()" 
                        class="absolute right-2 top-2 bottom-2 px-6 btn-brain rounded-xl font-bold text-xs uppercase">GÖNDER</button>
            </div>
        </footer>
    </div>

    <script>
        let CONFIG = null, SESSION = null;
        try { SESSION = JSON.parse(localStorage.getItem('hbrain_session')); } catch(e) {}
        const decodeB64 = (s) => decodeURIComponent(escape(atob(s)));
        const encodeB64 = (s) => btoa(unescape(encodeURIComponent(s)));

        document.addEventListener('keydown', (e) => { if (e.key === 'Enter' && document.activeElement.id === 'u-input') handleSend(); });

        async function ghFetch(path, method = 'GET', body = null) {
            if (!CONFIG) return null;
            const url = `https://api.github.com/repos/${CONFIG.GITHUB_REPO}/contents/${path}`;
            const headers = { "Authorization": `token ${CONFIG.GITHUB_TOKEN}`, "Accept": "application/vnd.github.v3+json" };
            try {
                if (method === 'GET') {
                    const r = await fetch(url, { headers, cache: 'no-store' });
                    if (r.ok) { const d = await r.json(); return { content: JSON.parse(decodeB64(d.content.replace(/\n/g, ""))), sha: d.sha }; }
                } else if (method === 'PUT') {
                    const curr = await ghFetch(path);
                    const payload = { message: 'Sync', content: encodeB64(JSON.stringify(body, null, 4)), sha: curr ? curr.sha : null };
                    await fetch(url, { method: 'PUT', headers: {...headers, "Content-Type": "application/json"}, body: JSON.stringify(payload) });
                    return true;
                }
            } catch(e) {} return null;
        }

        async function pbkdf2(p, s, i) {
            const enc = new TextEncoder(), key = await crypto.subtle.importKey('raw', enc.encode(p), 'PBKDF2', false, ['deriveBits']);
            const salt = Uint8Array.from(atob(s), c => c.charCodeAt(0));
            const bits = await crypto.subtle.deriveBits({ name: 'PBKDF2', salt, iterations: i, hash: 'SHA-256' }, key, 256);
            return btoa(String.fromCharCode(...new Uint8Array(bits)));
        }

        function addMessage(role, text) {
            const box = document.getElementById('chat'), div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            let content = text;
            const cmdMatch = text.match(/\[KOMUT: '(.*?)'\]/);
            if (cmdMatch) {
                const cmd = cmdMatch[1];
                content = text.replace(cmdMatch[0], `<button onclick="runCmd('${cmd}')" class="block mt-4 bg-cyan-500/10 border border-cyan-500/30 text-cyan-400 px-4 py-2 rounded-lg text-[10px] font-bold hover:bg-cyan-500/20">KOMUTU ÇALIŞTIR: ${cmd}</button>`);
            }
            div.innerHTML = `<div class="max-w-[80%] p-5 text-sm ${role === 'user' ? 'message-user' : 'message-ai'}"><div class="text-[8px] uppercase opacity-40 mb-2 font-bold">${role === 'user' ? 'Hakan Bey' : 'Hakan Brain'}</div><div>${content.replace(/\n/g, '<br>')}</div></div>`;
            box.appendChild(div); box.scrollTop = box.scrollHeight;
        }

        async function handleLogin() {
            const u = document.getElementById('l-user').value, p = document.getElementById('l-pass').value;
            const res = await ghFetch('users.json');
            const user = res?.content?.find(x => x.username === u);
            if (user && await pbkdf2(p, user.password_salt, user.password_iterations) === user.password_hash) {
                localStorage.setItem('hbrain_session', JSON.stringify(user)); location.reload();
            } else alert("Hata!");
        }

        async function handleSend() {
            const inp = document.getElementById('u-input'), msg = inp.value.trim();
            if (!msg) return; inp.value = ''; addMessage('user', msg);
            await ghFetch('task.json', 'PUT', [{ id: Date.now(), cmd: msg, status: 'pending', type: 'chat' }]);
        }

        async function runCmd(cmd) { addMessage('user', `Komutu onayla: ${cmd}`); await ghFetch('task.json', 'PUT', [{ id: Date.now(), cmd: cmd, status: 'pending', type: 'cmd' }]); }

        async function sync() {
            const st = await ghFetch('status_pc.json');
            if (st?.content) {
                const d = st.content;
                document.getElementById('device-name').innerText = d.name;
                document.getElementById('stat-cpu').innerText = d.cpu;
                document.getElementById('stat-ram').innerText = d.ram;
                document.getElementById('stat-bat').innerText = d.battery;
                document.getElementById('device-pill').classList.remove('hidden');
            }
            const son = await ghFetch('sonuc.json');
            if (son?.content) {
                const last = son.content[son.content.length - 1];
                if (last && (!window.lastId || window.lastId !== last.id)) {
                    window.lastId = last.id;
                    if (last.status === 'ai_response') addMessage('ai', last.output);
                    else addMessage('ai', `<pre class="text-emerald-400 text-xs mt-4 bg-black/40 p-4 rounded-xl font-mono">${last.output}</pre>`);
                }
            }
        }

        window.onload = async () => {
            const r = await fetch('./config.json'); CONFIG = await r.json();
            if (SESSION) { document.getElementById('auth-layer').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); setInterval(sync, 4000); sync(); }
        };
        function logout() { localStorage.removeItem('hbrain_session'); location.reload(); }
    </script>
</body>
</html>
